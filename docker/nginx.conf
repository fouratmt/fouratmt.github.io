server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    server_tokens off;

    add_header Content-Security-Policy "default-src 'self'; img-src 'self' https: data:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; object-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), browsing-topics=()" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;

    location ~* \.(?:css|gif|ico|jpe?g|js|png|svg|webp|woff2?)$ {
        expires 30d;
        try_files $uri =404;
    }

    location ~* \.pdf$ {
        expires 1h;
        try_files $uri =404;
    }
}
